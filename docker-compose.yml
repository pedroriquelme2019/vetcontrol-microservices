    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: historial-service

    ports:
      - "8087:8087"

    environment:
      <<: *common-environment

      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_historial?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
