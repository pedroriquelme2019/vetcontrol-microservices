name: vetcontrol

# CONFIGURACIÓN REUTILIZABLE DE MICROSERVICIOS

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - vetcontrol-network
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "curl -fsS http://localhost:$${SERVER_PORT}/actuator/health || exit 1"
      ]
    interval: 20s
    timeout: 10s
    retries: 15
    start_period: 60s

x-common-environment: &common-environment
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"
  EUREKA_INSTANCE_PREFERIPADDRESS: "true"
  SECURITY_JWT_SECRET: "${JWT_SECRET}"
  JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m"

services:


  # MYSQL


  mysql:
    image: mysql:8.0
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "vetcontrol_auth"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro

    networks:
      - vetcontrol-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s


  # ZOOKEEPER

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

    networks:
      - vetcontrol-network


  # KAFKA

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped

    depends_on:
      zookeeper:
        condition: service_started

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Listener utilizado por los contenedores
      KAFKA_LISTENERS: >-
        INTERNAL://0.0.0.0:29092,
        EXTERNAL://0.0.0.0:9092

      # Direcciones anunciadas a los clientes
      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka:29092,
        EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - vetcontrol-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s


  # EUREKA SERVER


  eureka-server:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: eureka-server

    ports:
      - "8761:8761"

    environment:
      SERVER_PORT: 8761
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m"

      EUREKA_INSTANCE_HOSTNAME: "eureka-server"
      EUREKA_CLIENT_REGISTERWITHEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server:8761/eureka/"


  # API GATEWAY


  api-gateway:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway

    ports:
      - "8080:8080"

    environment:
      <<: *common-environment
      SERVER_PORT: 8080

    depends_on:
      eureka-server:
        condition: service_healthy


  # AUTH SERVICE

  auth-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: auth-service

    ports:
      - "8081:8081"

    environment:
      <<: *common-environment

      SERVER_PORT: 8081

      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"

      SPRING_JPA_HIBERNATE_DDLAUTO: "update"
      SPRING_JPA_OPENINVIEW: "false"

      APP_SEED_ENABLED: "true"
      APP_SEED_ADMINPASSWORD: "${ADMIN_PASSWORD}"
      APP_SEED_RECEPCIONPASSWORD: "${RECEPCION_PASSWORD}"
      APP_SEED_VETERINARIOPASSWORD: "${VETERINARIO_PASSWORD}"

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


  # CLIENTE SERVICE


  cliente-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: cliente-service

    ports:
      - "8082:8082"

    environment:
      <<: *common-environment

      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_clientes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDLAUTO: "update"

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


  # MASCOTA SERVICE

  mascota-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: mascota-service

    ports:
      - "8083:8083"

    environment:
      <<: *common-environment

      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_mascotas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDLAUTO: "update"

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


  # VETERINARIO SERVICE

  veterinario-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: veterinario-service

    ports:
      - "8084:8084"

    environment:
      <<: *common-environment

      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_veterinarios?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDLAUTO: "update"

    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


  # AGENDA SERVICE

  agenda-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: agenda-service

    ports:
      - "8085:8085"

    environment:
      <<: *common-environment

      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_agenda?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDLAUTO: "update"

      SPRING_KAFKA_BOOTSTRAPSERVERS: "kafka:29092"

    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy


  # ATENCION SERVICE

  atencion-service:
    <<: *service-defaults

    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: atencion-service

    ports:
      - "8086:8086"

    environment:
      <<: *common-environment

      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vetcontrol_atenciones?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDLAUTO: "update"

      SPRING_KAFKA_BOOTSTRAPSERVERS: "kafka:29092"

    depends_on:
