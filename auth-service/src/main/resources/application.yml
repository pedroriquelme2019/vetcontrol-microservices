server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/vetcontrol_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: vetcontrol
    password: vetcontrol123

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  jackson:
    mapper:
      accept-case-insensitive-enums: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET:vetcontrol-secret-key-2026-vetcontrol-secret-key-2026}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}

app:
  seed:
    enabled: ${SEED_USERS_ENABLED:true}
    admin-password: ${ADMIN_PASSWORD:admin123}
    recepcion-password: ${RECEPCION_PASSWORD:recepcion123}
    veterinario-password: ${VETERINARIO_PASSWORD:vet123}

logging:
  level:
    cl.duoc.vetcontrol: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info